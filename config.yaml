# AIRouter Configuration
# ======================
# NOTE: Providers & Routes are managed via the Dashboard UI and stored in the database.
# This file only controls server-level settings.
#
server:
  host: "0.0.0.0"
  port: 3000

# Virtual API keys for clients
keys:
  - sk-test-abc123

rate_limit:
  enabled: true
  requests_per_minute: 60
  burst_size: 20

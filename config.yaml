# AIRouter Configuration
# ======================
server:
  host: "0.0.0.0"
  port: 3000

# Virtual API keys for clients
keys:
  - sk-test-abc123
  - sk-prod-xyz789

# Upstream providers
# Supported types: openai | anthropic | openai_compat | opencode_free | mimo_free
#
# opencode_free — No auth required. Uses opencode.ai public API.
# mimo_free     — No auth required. JWT bootstrap from xiaomimimo.com.
# openai        — native OpenAI API (api_key required)
# anthropic     — native Anthropic API (api_key required)
# openai_compat — Any OpenAI-compatible provider (Groq, OpenRouter, etc.)
#
providers:
  # ─── OpenCode Free ─────────────────────────────────────────────
  # FREE, no API key needed. Uses public Bearer token + client header.
  # Endpoints: opencode.ai/zen/v1 (OpenAI-compatible)
  # Available: Kimi, GLM, Qwen, MiMo, MiniMax models
  - name: "opencode"
    type: opencode_free
    api_key: ""                          # not used
    base_url: ""                         # hardcoded
    models:
      - "kimi-k2.6"
      - "kimi-k2.5"
      - "glm-5.1"
      - "glm-5"
      - "qwen3.5-plus"
      - "qwen3.6-plus"
      - "mimo-v2-pro"
      - "mimo-v2-omni"
      - "minimax-m2.7"
      - "minimax-m2.5"

  # ─── MiMo Free ─────────────────────────────────────────────────
  # FREE, no API key needed. Auto JWT bootstrap.
  # Endpoints: api.xiaomimimo.com/api/free-ai
  # Available: MiMo V2.5 Pro, V2.5, V2 Omni, V2 Flash
  - name: "mimo"
    type: mimo_free
    api_key: ""                          # not used
    base_url: ""                         # hardcoded
    models:
      - "mimo-v2.5-pro"
      - "mimo-v2.5"
      - "mimo-v2-omni"
      - "mimo-v2-flash"

  # ─── OpenAI (paid) ─────────────────────────────────────────────
  - name: "openai"
    type: openai
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    models:
      - "gpt-4o"
      - "gpt-4o-mini"
      - "o3"

  # ─── Anthropic (paid) ──────────────────────────────────────────
  - name: "anthropic"
    type: anthropic
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "https://api.anthropic.com/v1"
    models:
      - "claude-sonnet-4-20250514"
      - "claude-3-5-sonnet-20241022"
      - "claude-3-haiku-20240307"
      - "claude-opus-4-20250514"

  # ─── OpenCode Go (paid $5/mo) ──────────────────────────────────
  - name: "opencode-go"
    type: openai_compat
    api_key: "${OPENCODE_API_KEY}"
    base_url: "https://opencode.ai/zen/go/v1"
    models:
      - "kimi-k2.6"
      - "kimi-k2.5"
      - "glm-5.1"
      - "qwen3.5-plus"
      - "mimo-v2-pro"
      - "mimo-v2-omni"
      - "minimax-m2.7"
      - "minimax-m2.5"

  # ─── Groq ──────────────────────────────────────────────────────
  - name: "groq"
    type: openai_compat
    api_key: "${GROQ_API_KEY}"
    base_url: "https://api.groq.com/openai/v1"
    models:
      - "llama-3.3-70b-versatile"
      - "mixtral-8x7b-32768"
      - "deepseek-r1-distill-llama-70b"

  # ─── Ollama (local) ────────────────────────────────────────────
  - name: "ollama"
    type: openai_compat
    api_key: ""
    base_url: "http://localhost:11434/v1"
    models:
      - "llama3.2"
      - "mistral"

# Routing rules — map model names to provider groups
# DEFAULT: use FREE providers (opencode, mimo) as primary
routes:
  # ── OpenCode Free models (DEFAULT — no key needed) ─────────────
  - model: "kimi-k2.6"
    strategy: fallback
    providers:
      - "opencode"
      - "opencode-go"

  - model: "kimi-k2.5"
    strategy: fallback
    providers:
      - "opencode"
      - "opencode-go"

  - model: "glm-5.1"
    strategy: fallback
    providers:
      - "opencode"
      - "opencode-go"

  - model: "qwen3.5-plus"
    strategy: fallback
    providers:
      - "opencode"
      - "opencode-go"

  - model: "mimo-v2-pro"
    strategy: fallback
    providers:
      - "opencode"
      - "opencode-go"

  - model: "minimax-m2.7"
    strategy: fallback
    providers:
      - "opencode"
      - "opencode-go"

  # ── MiMo Free models (DEFAULT — no key needed) ─────────────────
  - model: "mimo-v2.5-pro"
    strategy: single
    provider: "mimo"

  - model: "mimo-v2.5"
    strategy: single
    provider: "mimo"

  - model: "mimo-v2-flash"
    strategy: single
    provider: "mimo"

  # ── OpenAI models ──────────────────────────────────────────────
  - model: "gpt-4o"
    strategy: fallback
    providers:
      - "openai"
      - "opencode"

  - model: "gpt-4o-mini"
    strategy: single
    provider: "openai"

  # ── Anthropic models ───────────────────────────────────────────
  - model: "claude-sonnet-4-20250514"
    strategy: single
    provider: "anthropic"

  - model: "claude-3-5-sonnet-20241022"
    strategy: single
    provider: "anthropic"

  # ── Groq models ────────────────────────────────────────────────
  - model: "llama-3.3-70b-versatile"
    strategy: single
    provider: "groq"

  # ── Ollama (local) ─────────────────────────────────────────────
  - model: "llama3.2"
    strategy: single
    provider: "ollama"

  # Wildcard catch-all: any unmatched model → opencode (free), fallback groq
  - model: "*"
    strategy: fallback
    providers:
      - "opencode"
      - "groq"
      - "ollama"

# Rate limiting (per API key)
rate_limit:
  enabled: true
  requests_per_minute: 60
  burst_size: 20
